# ============================================================
# Tmux 配置文件
# 特性：Vi 风格操作 + 鼠标滚轮翻页 + 打字自动退出 copy-mode
# ============================================================

# -----------------------
# 基础配置
# -----------------------

# 前缀键改为 Ctrl+a（比 Ctrl+b 更顺手）
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 启用鼠标支持
set -g mouse on

# 256 色支持
set -g default-terminal "screen-256color"

# 历史记录 10000 行
set -g history-limit 10000

# 边框样式
set -g pane-border-style fg=colour244
set -g pane-active-border-style fg=colour82

# -----------------------
# 分屏快捷键
# -----------------------

unbind '"'
unbind %

# 前缀 + h: 左右分屏
bind h split-window -h

# 前缀 + v: 上下分屏
bind v split-window -v

# Ctrl+Space: 上下分屏并均分
bind-key -n C-Space split-window -v \; select-layout even-vertical

# Ctrl+F2: 左右分屏
bind-key -n C-F2 split-window -h

# Ctrl+F4: 创建 2x2 四面板
bind-key -n C-F4 split-window -h \; split-window -v \; select-pane -L \; split-window -v

# Ctrl+F6: 创建 3+3 六面板
bind-key -n C-F6 split-window -h \; split-window -v \; split-window -v \; select-pane -L \; split-window -v \; split-window -v

# -----------------------
# 面板切换（Vim 风格）
# -----------------------

# Alt + h/j/k/l: 切换面板
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# 前缀 + < / >: 交换面板位置
bind < swap-pane -U
bind > swap-pane -D

# 前缀 + z: 放大/还原面板
bind z resize-pane -Z

# -----------------------
# 窗口操作
# -----------------------

bind c new-window
bind & kill-window
bind , command-prompt "rename-window %%"

# -----------------------
# 复制粘贴（Vi 风格）
# -----------------------

setw -g mode-keys vi

# v: 开始选择
bind-key -T copy-mode-vi v send -X begin-selection

# y: 复制并退出
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# 鼠标拖选后复制到系统剪贴板
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"

# -----------------------
# 鼠标滚轮翻页 + 打字自动退出
# -----------------------

# 滚轮进入 copy-mode（-e: 有输出时自动退出）
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# Escape / q: 退出 copy-mode
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi q send-keys -X cancel

# 字母键：退出 copy-mode 并发送该键
bind-key -T copy-mode-vi a send-keys -X cancel \; send-keys a
bind-key -T copy-mode-vi b send-keys -X cancel \; send-keys b
bind-key -T copy-mode-vi c send-keys -X cancel \; send-keys c
bind-key -T copy-mode-vi d send-keys -X cancel \; send-keys d
bind-key -T copy-mode-vi e send-keys -X cancel \; send-keys e
bind-key -T copy-mode-vi f send-keys -X cancel \; send-keys f
bind-key -T copy-mode-vi g send-keys -X cancel \; send-keys g
bind-key -T copy-mode-vi h send-keys -X cancel \; send-keys h
bind-key -T copy-mode-vi i send-keys -X cancel \; send-keys i
bind-key -T copy-mode-vi j send-keys -X cancel \; send-keys j
bind-key -T copy-mode-vi k send-keys -X cancel \; send-keys k
bind-key -T copy-mode-vi l send-keys -X cancel \; send-keys l
bind-key -T copy-mode-vi m send-keys -X cancel \; send-keys m
bind-key -T copy-mode-vi n send-keys -X cancel \; send-keys n
bind-key -T copy-mode-vi o send-keys -X cancel \; send-keys o
bind-key -T copy-mode-vi p send-keys -X cancel \; send-keys p
bind-key -T copy-mode-vi r send-keys -X cancel \; send-keys r
bind-key -T copy-mode-vi s send-keys -X cancel \; send-keys s
bind-key -T copy-mode-vi t send-keys -X cancel \; send-keys t
bind-key -T copy-mode-vi u send-keys -X cancel \; send-keys u
bind-key -T copy-mode-vi w send-keys -X cancel \; send-keys w
bind-key -T copy-mode-vi x send-keys -X cancel \; send-keys x
bind-key -T copy-mode-vi z send-keys -X cancel \; send-keys z
bind-key -T copy-mode-vi Enter send-keys -X cancel \; send-keys Enter
bind-key -T copy-mode-vi Space send-keys -X cancel \; send-keys Space

# -----------------------
# 状态栏
# -----------------------

set -g status-bg colour235
set -g status-fg white
set -g status-left '#[fg=green]🧭 TMUX #[fg=white]| #S '
set -g status-right '#(date +"%Y-%m-%d %H:%M")'
setw -g automatic-rename on

# -----------------------
# 其他
# -----------------------

# 前缀 + r: 重载配置
bind r source-file ~/.tmux.conf \; display "✅ 配置已重载"

# 前缀 + s: 切换同步输入模式（广播到所有面板）
bind s setw synchronize-panes

# -----------------------
# Kitty 集成
# -----------------------

# 传递 Kitty 环境变量到 tmux session，使 Claude Code hook 能注册终端
set -ga update-environment " KITTY_WINDOW_ID"
set -ga update-environment " KITTY_LISTEN_ON"
